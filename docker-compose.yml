services:
  app:
    platform: "${DOCKER_PLATFORM:-linux/amd64}"
    build: .
    image: voice-message-studio
    container_name: voice-message-studio-app
    env_file:
      - .env
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
